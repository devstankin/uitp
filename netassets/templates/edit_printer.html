{% extends 'base.html' %}

{% block title %}Редактировать принтер - Управление сетевыми активами{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">
        <i class="fas fa-edit me-2"></i>
        Редактировать принтер
    </h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'printers_table' %}" class="btn btn-sm btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i> Назад к списку
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="model" class="form-label">Модель принтера *</label>
                    <input type="text" class="form-control" id="model" name="model" value="{{ printer.model }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="ip_address" class="form-label">IP-адрес *</label>
                    <input type="text" class="form-control" id="ip_address" name="ip_address" value="{{ printer.ip_address }}" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="printer_name" class="form-label">Имя принтера *</label>
                    <input type="text" class="form-control" id="printer_name" name="printer_name" value="{{ printer.printer_name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="room" class="form-label">Кабинет *</label>
                    <input type="text" class="form-control" id="room" name="room" value="{{ printer.room }}" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="department" class="form-label">Подразделение *</label>
                    <input type="text" class="form-control" id="department" name="department" value="{{ printer.department }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="employee_name" class="form-label">ФИО сотрудника *</label>
                    <input type="text" class="form-control" id="employee_name" name="employee_name" value="{{ printer.employee_name }}" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="computers" class="form-label">Компьютеры для подключения *</label>
                    <input type="text" class="form-control" id="computers" name="computers" value="{{ printer.computers }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="admin_login" class="form-label">Логин администратора *</label>
                    <input type="text" class="form-control" id="admin_login" name="admin_login" value="{{ printer.admin_login }}" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="admin_password" class="form-label">Пароль администратора *</label>
                    <input type="password" class="form-control" id="admin_password" name="admin_password" value="{{ printer.admin_password }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="notes" class="form-label">Примечания</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3">{{ printer.notes }}</textarea>
                </div>
            </div>
            
            <div class="d-flex justify-content-end">
                <a href="{% url 'printers_table' %}" class="btn btn-secondary me-2">Отмена</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> Сохранить
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
