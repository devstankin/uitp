{% extends 'base.html' %}

{% block title %}Редактировать сетевое устройство - Управление сетевыми активами{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">
        <i class="fas fa-edit me-2"></i>
        Редактировать сетевое устройство
    </h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'network_devices_table' %}" class="btn btn-sm btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i> Назад к списку
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="code" class="form-label">Код *</label>
                    <input type="text" class="form-control" id="code" name="code" value="{{ device.code }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="ip_address" class="form-label">IP-адрес *</label>
                    <input type="text" class="form-control" id="ip_address" name="ip_address" value="{{ device.ip_address }}" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="subnet" class="form-label">Подсеть *</label>
                    <input type="text" class="form-control" id="subnet" name="subnet" value="{{ device.subnet }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="network_type" class="form-label">Тип сети *</label>
                    <select class="form-select" id="network_type" name="network_type" required>
                        <option value="">Выберите тип сети</option>
                        <option value="Static" {% if device.network_type == 'Static' %}selected{% endif %}>Статический</option>
                        <option value="DHCP" {% if device.network_type == 'DHCP' %}selected{% endif %}>DHCP</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="hostname" class="form-label">Имя хоста *</label>
                    <input type="text" class="form-control" id="hostname" name="hostname" value="{{ device.hostname }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="device_type" class="form-label">Тип устройства *</label>
                    <select class="form-select" id="device_type" name="device_type" required>
                        <option value="">Выберите тип устройства</option>
                        <option value="printer" {% if device.device_type == 'printer' %}selected{% endif %}>Принтер</option>
                        <option value="computer" {% if device.device_type == 'computer' %}selected{% endif %}>Компьютер</option>
                        <option value="router" {% if device.device_type == 'router' %}selected{% endif %}>Роутер</option>
                        <option value="switch" {% if device.device_type == 'switch' %}selected{% endif %}>Коммутатор</option>
                        <option value="camera" {% if device.device_type == 'camera' %}selected{% endif %}>Камера</option>
                        <option value="panel" {% if device.device_type == 'panel' %}selected{% endif %}>Панель</option>
                        <option value="server" {% if device.device_type == 'server' %}selected{% endif %}>Сервер</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="location" class="form-label">Местоположение *</label>
                    <input type="text" class="form-control" id="location" name="location" value="{{ device.location }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="department" class="form-label">Подразделение *</label>
                    <input type="text" class="form-control" id="department" name="department" value="{{ device.department }}" required>
                </div>
            </div>
            
            <div class="d-flex justify-content-end">
                <a href="{% url 'network_devices_table' %}" class="btn btn-secondary me-2">Отмена</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> Сохранить
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
