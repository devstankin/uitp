{% extends 'base.html' %}

{% block title %}Создать сетевое устройство - Управление сетевыми активами{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">
        <i class="fas fa-plus me-2"></i>
        Создать сетевое устройство
    </h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'assets:network_devices_table' %}" class="btn btn-sm btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i> Назад к списку
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="code" class="form-label">Код *</label>
                    <input type="text" class="form-control" id="code" name="code" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="ip_address" class="form-label">IP-адрес *</label>
                    <input type="text" class="form-control" id="ip_address" name="ip_address" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="subnet" class="form-label">Подсеть *</label>
                    <input type="text" class="form-control" id="subnet" name="subnet" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="network_type" class="form-label">Тип сети *</label>
                    <select class="form-select" id="network_type" name="network_type" required>
                        <option value="">Выберите тип сети</option>
                        <option value="Static">Статический</option>
                        <option value="DHCP">DHCP</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="hostname" class="form-label">Имя хоста *</label>
                    <input type="text" class="form-control" id="hostname" name="hostname" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="device_type" class="form-label">Тип устройства *</label>
                    <select class="form-select" id="device_type" name="device_type" required>
                        <option value="">Выберите тип устройства</option>
                        <option value="printer">Принтер</option>
                        <option value="computer">Компьютер</option>
                        <option value="router">Роутер</option>
                        <option value="switch">Коммутатор</option>
                        <option value="camera">Камера</option>
                        <option value="panel">Панель</option>
                        <option value="server">Сервер</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="location" class="form-label">Местоположение *</label>
                    <input type="text" class="form-control" id="location" name="location" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="department" class="form-label">Подразделение *</label>
                    <input type="text" class="form-control" id="department" name="department" required>
                </div>
            </div>
            
            <div class="d-flex justify-content-end">
                <a href="{% url 'assets:network_devices_table' %}" class="btn btn-secondary me-2">Отмена</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> Создать
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
