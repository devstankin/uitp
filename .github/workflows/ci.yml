name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'netassets' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      POSTGRES_DB: ${{ vars.POSTGRES_DB || 'netassets' }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER || 'postgres' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: ${{ vars.POSTGRES_HOST || 'localhost' }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT || '5432' }}
      DJANGO_SETTINGS_MODULE: netassets.settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./netassets
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: ./netassets
        run: |
          python manage.py migrate --noinput

      - name: Run tests
        working-directory: ./netassets
        run: |
          python manage.py test

