name: CI

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'  # Триггер на push тегов вида v1.0.0, v2.1.0 и т.д.
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'netassets' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      POSTGRES_DB: ${{ vars.POSTGRES_DB || 'netassets' }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER || 'postgres' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: ${{ vars.POSTGRES_HOST || 'localhost' }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT || '5432' }}
      DJANGO_SETTINGS_MODULE: netassets.settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./netassets
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: ./netassets
        run: |
          python manage.py migrate --noinput

      - name: Run tests
        working-directory: ./netassets
        run: |
          python manage.py test

  # Job для сборки и публикации Docker образа
  docker:
    # Запускаем только для main/master ветки или тегов
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    needs: tests  # Ждем успешного выполнения тестов
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write  # Необходимо для публикации в GitHub Packages
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.description="NetAssets Django Application"
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./netassets  # Контекст сборки - папка с проектом
          file: ./netassets/Dockerfile  # Путь к Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Дополнительные аргументы сборки, если нужны
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1